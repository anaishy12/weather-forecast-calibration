name: Daily OpenMeteo Data Collection

on:
  schedule:
    # 매일 자정(UTC 기준)에 실행 (한국 시간 오전 9시)
    - cron: '0 5 * * *'
  workflow_dispatch: # 수동으로도 실행 가능하게 설정

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests  # 스크립트에 필요한 라이브러리 추가

    - name: Run collector script
      run: python data/collector_om.py

    - name: Commit and Push changes
    # 데이터가 업데이트되었을 때만 커밋하도록 설정
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/log_openmeteo_raw.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily weather data" && git push)
